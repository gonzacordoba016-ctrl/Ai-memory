# mypy.ini
# Configuración de tipado estático para Stratum.
# Correr con: mypy . --config-file mypy.ini

[mypy]
python_version = 3.10
strict = False                  # No full-strict — demasiado agresivo para código legacy
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
disallow_untyped_defs = True    # Todas las funciones deben tener type hints
check_untyped_defs = True
no_implicit_optional = True
show_error_codes = True
pretty = True

# Módulos externos sin stubs — ignorar errores de import
[mypy-qdrant_client.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-networkx.*]
ignore_missing_imports = True

[mypy-serial.*]
ignore_missing_imports = True

[mypy-duckduckgo_search.*]
ignore_missing_imports = True

[mypy-pdfplumber.*]
ignore_missing_imports = True

# Módulos internos con código legacy — relajar gradualmente
[mypy-tools.web_search]
ignore_errors = True

[mypy-tools.code_executor]
ignore_errors = True

[mypy-tools.file_tools]
ignore_errors = True

[mypy-memory.pdf_memory]
ignore_errors = True

[mypy-memory.session_summarizer]
ignore_errors = True

[mypy-knowledge.*]
ignore_errors = True

[mypy-infrastructure.*]
ignore_errors = True