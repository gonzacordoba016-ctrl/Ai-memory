<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratum - Visualizador de Circuitos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.0.16/dist/svg.min.js"></script>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --bg-darker: #121212;
            --primary: #00ff88;
            --secondary: #00aaff;
            --text: #ffffff;
            --text-muted: #aaaaaa;
            --border: #333333;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-darker);
            color: var(--text);
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .header {
            background-color: var(--bg-dark);
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .viewer-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .panel {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            border-right: 1px solid var(--border);
        }
        
        .panel:last-child {
            border-right: none;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 1rem;
        }
        
        .tab {
            padding: 0.5rem 1rem;
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            cursor: pointer;
            margin-right: 0.5rem;
        }
        
        .tab.active {
            background-color: var(--primary);
            color: var(--bg-dark);
        }
        
        .view-content {
            height: calc(100% - 40px);
        }
        
        #schematic-view, #pcb-view {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
        }
        
        #breadboard-view {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
        }
        
        .hidden {
            display: none;
        }
        
        .component-list {
            background-color: var(--bg-dark);
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
        }
        
        .component-item {
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            background-color: #2a2a2a;
            border-left: 3px solid var(--primary);
        }
        
        .net-list {
            background-color: var(--bg-dark);
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
        }
        
        .net-item {
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            background-color: #2a2a2a;
            border-left: 3px solid var(--secondary);
        }
        
        button {
            background-color: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin: 0.5rem;
        }
        
        button:hover {
            opacity: 0.8;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        
        .info-panel {
            background-color: var(--bg-dark);
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Stratum - Visualizador de Circuitos</h1>
            <div class="controls">
                <button id="load-circuit">Cargar Circuito</button>
                <button id="export-pcb">Exportar PCB (Gerber)</button>
                <button id="export-svg">Exportar SVG</button>
                <button id="refresh-view">Actualizar Vista</button>
                <button id="btn-add-comp" style="background:#1a3a2a;border-color:#3fb950;color:#3fb950">+ Agregar</button>
                <button id="btn-del-comp" style="background:#3a1a1a;border-color:#ff7b72;color:#ff7b72;display:none">✕ Eliminar</button>
                <button id="btn-save-edit" style="background:#1a2a3a;border-color:#58a6ff;color:#58a6ff;display:none">💾 Guardar</button>
            </div>
            <!-- Editor: Add Component modal -->
            <div id="add-comp-modal" style="display:none;position:fixed;inset:0;background:#000a;z-index:100;align-items:center;justify-content:center">
                <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;width:340px;color:#e6edf3">
                    <h3 style="margin:0 0 12px;font-size:14px">Agregar Componente</h3>
                    <label style="font-size:11px;color:#8b949e">ID (ej: R2, U3, D2)</label>
                    <input id="ec-id" placeholder="R2" style="width:100%;margin:4px 0 10px;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:6px;border-radius:4px;font-size:12px">
                    <label style="font-size:11px;color:#8b949e">Tipo</label>
                    <select id="ec-type" style="width:100%;margin:4px 0 10px;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:6px;border-radius:4px;font-size:12px">
                        <option value="resistor">Resistor</option>
                        <option value="capacitor">Capacitor</option>
                        <option value="led">LED</option>
                        <option value="diode">Diodo</option>
                        <option value="transistor_npn">Transistor NPN</option>
                        <option value="button">Botón/Switch</option>
                        <option value="arduino_uno">Arduino Uno</option>
                        <option value="esp32">ESP32</option>
                        <option value="ic_generic">IC Genérico</option>
                        <option value="relay">Relay</option>
                        <option value="motor">Motor</option>
                        <option value="connector">Conector</option>
                        <option value="generic">Genérico</option>
                    </select>
                    <label style="font-size:11px;color:#8b949e">Nombre / descripción</label>
                    <input id="ec-name" placeholder="Resistencia 220Ω" style="width:100%;margin:4px 0 10px;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:6px;border-radius:4px;font-size:12px">
                    <label style="font-size:11px;color:#8b949e">Valor (opcional)</label>
                    <input id="ec-value" placeholder="220" style="width:100%;margin:4px 0 16px;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:6px;border-radius:4px;font-size:12px">
                    <div style="display:flex;gap:8px;justify-content:flex-end">
                        <button id="ec-cancel" style="background:none;border:1px solid #30363d;color:#8b949e;padding:6px 14px;border-radius:4px;cursor:pointer">Cancelar</button>
                        <button id="ec-confirm" style="background:#238636;border:1px solid #2ea043;color:#fff;padding:6px 14px;border-radius:4px;cursor:pointer">Agregar</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="viewer-container">
            <div class="panel">
                <div class="tabs">
                    <div class="tab active" data-view="schematic">Esquemático 2D</div>
                    <div class="tab" data-view="breadboard">Breadboard 3D</div>
                    <div class="tab" data-view="pcb">Layout PCB</div>
                </div>
                
                <div class="view-content">
                    <div id="schematic-view"></div>
                    <div id="breadboard-view" class="hidden"></div>
                    <div id="pcb-view" class="hidden"></div>
                </div>
            </div>
            
            <div class="panel" style="flex: 0.4;">
                <h2>📋 Información del Circuito</h2>
                <div class="info-panel">
                    <h3 id="circuit-name">Sin circuito cargado</h3>
                    <p id="circuit-description"></p>
                </div>
                
                <h3>_Componentes</h3>
                <div id="components-list" class="component-list">
                    <p>No hay componentes disponibles</p>
                </div>
                
                <h3>_Redes Eléctricas</h3>
                <div id="nets-list" class="net-list">
                    <p>No hay redes definidas</p>
                </div>
                
                <h3>⚙️ Acciones</h3>
                <div class="controls">
                    <button id="generate-firmware">Generar Firmware</button>
                    <button id="simulate-circuit">Simular Circuito</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        let currentCircuit = null;
        let threeScene = null;
        let threeRenderer = null;
        let threeCamera = null;

        // Posiciones personalizadas por componente (drag & drop)
        let componentPositions = {};

        // ── Drag & Drop sobre SVG ────────────────────────────────────────────
        // Gestión de arrastre de nodos en el esquemático

        let _dragState = null;

        function _initDraggable(svgEl, compId, onDrop) {
            svgEl.style.cursor = 'grab';
            svgEl.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const svgRoot = svgEl.closest('svg') || svgEl.ownerSVGElement;
                const pt      = svgRoot.createSVGPoint();
                const ctm     = svgRoot.getScreenCTM();

                function toSVGCoords(ex, ey) {
                    pt.x = ex; pt.y = ey;
                    return pt.matrixTransform(ctm.inverse());
                }

                const startSVG  = toSVGCoords(e.clientX, e.clientY);
                const bbox      = svgEl.getBoundingClientRect();
                const startSVGB = toSVGCoords(bbox.left + bbox.width / 2, bbox.top + bbox.height / 2);
                const offsetX   = startSVGB.x - startSVG.x;
                const offsetY   = startSVGB.y - startSVG.y;

                svgEl.style.cursor = 'grabbing';

                function onMove(ev) {
                    const p = toSVGCoords(ev.clientX, ev.clientY);
                    const nx = p.x + offsetX;
                    const ny = p.y + offsetY;
                    const transform = svgEl.getAttribute('transform') || '';
                    // Actualizar translate
                    svgEl.setAttribute('transform', `translate(${nx},${ny})`);
                    _dragState = { compId, x: nx, y: ny };
                }

                function onUp() {
                    svgEl.style.cursor = 'grab';
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    if (_dragState && _dragState.compId === compId) {
                        componentPositions[compId] = { x: _dragState.x, y: _dragState.y };
                        onDrop(compId, _dragState.x, _dragState.y);
                        _dragState = null;
                    }
                }

                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        }

        async function _saveLayout(circuitId) {
            if (!circuitId) return;
            try {
                await fetch(`/api/circuits/${circuitId}/layout`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ positions: componentPositions }),
                });
            } catch (e) {
                console.warn('[Layout] Error guardando posiciones:', e);
            }
        }
        
        // Elementos del DOM
        const tabs = document.querySelectorAll('.tab');
        const schematicView = document.getElementById('schematic-view');
        const breadboardView = document.getElementById('breadboard-view');
        const pcbView = document.getElementById('pcb-view');
        const circuitName = document.getElementById('circuit-name');
        const circuitDescription = document.getElementById('circuit-description');
        const componentsList = document.getElementById('components-list');
        const netsList = document.getElementById('nets-list');
        
        // Event Listeners para tabs
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Remover clase activa de todos los tabs
                tabs.forEach(t => t.classList.remove('active'));
                // Agregar clase activa al tab clickeado
                tab.classList.add('active');
                
                // Ocultar todas las vistas
                schematicView.classList.add('hidden');
                breadboardView.classList.add('hidden');
                pcbView.classList.add('hidden');
                
                // Mostrar la vista correspondiente
                const view = tab.getAttribute('data-view');
                if (view === 'schematic') {
                    schematicView.classList.remove('hidden');
                } else if (view === 'breadboard') {
                    breadboardView.classList.remove('hidden');
                    // Reset si hay un circuito nuevo cargado
                    if (threeScene && threeScene._circuitId !== (currentCircuit && (currentCircuit.id || currentCircuit.design_id))) {
                        _resetThreeJS();
                    }
                    initThreeJS().then(() => {
                        if (threeScene && currentCircuit) {
                            threeScene._circuitId = currentCircuit.id || currentCircuit.design_id;
                        }
                    });
                } else if (view === 'pcb') {
                    pcbView.classList.remove('hidden');
                    renderPCB();
                }
            });
        });
        
        // Función para cargar circuito de ejemplo
        document.getElementById('load-circuit').addEventListener('click', loadSampleCircuit);
        
        // Función para exportar PCB
        document.getElementById('export-pcb').addEventListener('click', exportPCB);
        
        // Función para exportar SVG
        document.getElementById('export-svg').addEventListener('click', exportSVG);
        
        // Función para generar firmware
        document.getElementById('generate-firmware').addEventListener('click', generateFirmware);
        
        // Función para simular circuito
        document.getElementById('simulate-circuit').addEventListener('click', simulateCircuit);
        
        // Cargar circuito de muestra al iniciar
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const circuitId = params.get('id');
            if (circuitId) {
                loadCircuitById(parseInt(circuitId));
            } else {
                loadSampleCircuit();
            }
        });

        async function loadCircuitById(id) {
            try {
                const res = await _viewerFetch(`/api/circuits/${id}`);
                if (!res.ok) { loadSampleCircuit(); return; }
                const data = await res.json();
                if (data.error) { loadSampleCircuit(); return; }
                data.id = data.id || id;
                currentCircuit = data;
                pcbView.dataset.loaded = '';
                updateCircuitInfo();
                renderSchematic();
                renderComponentsList();
                renderNetsList();
            } catch (e) {
                console.error('[Viewer] Error cargando circuito:', e);
                loadSampleCircuit();
            }
        }

        // Función para cargar circuito de ejemplo (fallback)
        function loadSampleCircuit() {
            const sampleCircuit = {
                "name": "LED Blinker",
                "description": "Circuito básico para parpadear un LED con Arduino",
                "components": [
                    {"id": "U1", "name": "Arduino Uno", "type": "arduino_uno"},
                    {"id": "R1", "name": "Resistencia 220Ω", "type": "resistor", "value": "220", "unit": "ohm"},
                    {"id": "D1", "name": "LED Rojo", "type": "led", "color": "red"}
                ],
                "nets": [
                    {"name": "VCC", "nodes": ["U1.5V", "D1.A"]},
                    {"name": "GND", "nodes": ["U1.GND", "R1.2", "D1.K"]},
                    {"name": "NET_LED", "nodes": ["U1.13", "R1.1"]}
                ],
                "power": "5V USB",
                "warnings": []
            };
            currentCircuit = sampleCircuit;
            updateCircuitInfo();
            renderSchematic();
            renderComponentsList();
            renderNetsList();
        }
        
        // Actualizar información del circuito
        function updateCircuitInfo() {
            if (!currentCircuit) return;

            circuitName.textContent = currentCircuit.name;
            const sourceTool = currentCircuit.metadata?.source_tool;
            circuitDescription.textContent = currentCircuit.description +
                (sourceTool ? ` [${sourceTool.toUpperCase()}]` : '');
        }
        
        // ── Esquemático 2D — usa SVG generado por el servidor ───────────────────
        async function renderSchematic() {
            if (!currentCircuit) return;

            schematicView.innerHTML = '';
            schematicView.style.position = 'relative';

            const circuitId = currentCircuit.id || currentCircuit.design_id;

            if (circuitId) {
                schematicView.innerHTML =
                    '<div style="display:flex;height:100%;align-items:center;justify-content:center;' +
                    'color:#555;font-family:monospace;font-size:13px">Generando esquemático…</div>';
                try {
                    const res = await _viewerFetch(`/api/circuits/${circuitId}/schematic.svg`);
                    if (res.ok) {
                        const svgText = await res.text();
                        schematicView.innerHTML = '';
                        const wrapper = document.createElement('div');
                        wrapper.style.cssText =
                            'width:100%;height:100%;overflow:hidden;position:relative;background:#0d1117;';
                        wrapper.innerHTML = svgText;
                        const svgEl = wrapper.querySelector('svg');
                        if (svgEl) {
                            svgEl.style.cssText = 'display:block;width:100%;height:100%;cursor:grab;';
                            _initSVGPanZoom(svgEl);
                        }
                        schematicView.appendChild(wrapper);
                        return;
                    }
                } catch(e) {
                    console.warn('[Viewer] Server SVG error:', e);
                }
            }

            // Fallback: renderizado client-side para circuitos sin ID
            _renderSchematicFallback();
        }

        // Pan & zoom sobre el SVG incrustado
        function _initSVGPanZoom(svgEl) {
            const origVB = (svgEl.getAttribute('viewBox') || '0 0 1000 700').split(' ').map(Number);
            let [vx, vy, vw, vh] = origVB;
            let scale = 1;

            function applyVB() {
                svgEl.setAttribute('viewBox',
                    `${vx} ${vy} ${(vw / scale).toFixed(1)} ${(vh / scale).toFixed(1)}`);
            }

            svgEl.addEventListener('wheel', e => {
                e.preventDefault();
                const delta = e.deltaY < 0 ? 1.15 : 0.87;
                scale = Math.max(0.15, Math.min(10, scale * delta));
                applyVB();
            }, { passive: false });

            let isPanning = false, startX = 0, startY = 0;
            svgEl.addEventListener('mousedown', e => {
                if (e.button !== 0) return;
                isPanning = true; startX = e.clientX; startY = e.clientY;
                svgEl.style.cursor = 'grabbing'; e.preventDefault();
            });
            window.addEventListener('mousemove', e => {
                if (!isPanning) return;
                const cw = svgEl.clientWidth  || 1;
                const ch = svgEl.clientHeight || 1;
                vx -= (e.clientX - startX) * (vw / scale) / cw;
                vy -= (e.clientY - startY) * (vh / scale) / ch;
                startX = e.clientX; startY = e.clientY;
                applyVB();
            });
            window.addEventListener('mouseup', () => {
                isPanning = false; svgEl.style.cursor = 'grab';
            });

            // Reset on double-click
            svgEl.addEventListener('dblclick', () => {
                [vx, vy, vw, vh] = origVB; scale = 1; applyVB();
            });
        }

        // ── Layout PCB — carga SVG del servidor ──────────────────────────────
        let _pcbLoaded = false;
        async function renderPCB() {
            if (!currentCircuit) return;
            const circuitId = currentCircuit.id || currentCircuit.design_id;
            if (!circuitId) {
                pcbView.innerHTML =
                    '<div style="display:flex;height:100%;align-items:center;justify-content:center;' +
                    'color:#555;font-family:monospace;font-size:13px">PCB no disponible (circuito sin ID)</div>';
                return;
            }
            // Solo recargar si cambia el circuito
            const marker = `pcb-${circuitId}`;
            if (pcbView.dataset.loaded === marker) return;

            pcbView.innerHTML =
                '<div style="display:flex;height:100%;align-items:center;justify-content:center;' +
                'color:#555;font-family:monospace;font-size:13px">Generando PCB…</div>';
            try {
                const res = await _viewerFetch(`/api/circuits/${circuitId}/pcb.svg`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const svgText = await res.text();
                pcbView.innerHTML = '';
                const wrapper = document.createElement('div');
                wrapper.style.cssText = 'width:100%;height:100%;overflow:auto;background:#1a4a1a;';
                wrapper.innerHTML = svgText;
                const svgEl = wrapper.querySelector('svg');
                if (svgEl) {
                    svgEl.style.cssText = 'display:block;max-width:100%;height:auto;';
                }
                pcbView.appendChild(wrapper);
                pcbView.dataset.loaded = marker;
            } catch(e) {
                pcbView.innerHTML =
                    `<div style="display:flex;height:100%;align-items:center;justify-content:center;` +
                    `color:#f85149;font-family:monospace;font-size:12px">Error cargando PCB: ${e.message}</div>`;
            }
        }

        // Fallback renderizado básico para circuitos sin ID (recién generados no guardados)
        function _renderSchematicFallback() {
            if (!currentCircuit) return;
            schematicView.innerHTML = '';

            const svgNS = 'http://www.w3.org/2000/svg';
            const svg   = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.style.cssText = 'display:block;background:#1e1e1e;';
            schematicView.appendChild(svg);

            const bg = document.createElementNS(svgNS, 'rect');
            bg.setAttribute('width', '100%'); bg.setAttribute('height', '100%');
            bg.setAttribute('fill', '#1e1e1e');
            svg.appendChild(bg);

            const title = document.createElementNS(svgNS, 'text');
            title.setAttribute('x', 20); title.setAttribute('y', 30);
            title.setAttribute('font-size', 16); title.setAttribute('fill', 'white');
            title.setAttribute('font-family', 'Arial');
            title.textContent = currentCircuit.name || 'Circuito';
            svg.appendChild(title);

            // Posiciones
            const savedPos = currentCircuit.positions || {};
            currentCircuit.components.forEach((comp, index) => {
                if (savedPos[comp.id]) {
                    componentPositions[comp.id] = savedPos[comp.id];
                } else if (!componentPositions[comp.id]) {
                    componentPositions[comp.id] = {
                        x: 100 + (index % 4) * 140,
                        y: 120 + Math.floor(index / 4) * 100,
                    };
                }
            });

            const circuitId = currentCircuit.id || null;
            const netColors = ['#ff5555','#55ff55','#5555ff','#ffff55','#ff55ff','#55ffff'];

            // Conexiones
            currentCircuit.nets.forEach((net, ni) => {
                const color = netColors[ni % netColors.length];
                for (let i = 0; i < net.nodes.length - 1; i++) {
                    const id1 = net.nodes[i].split('.')[0];
                    const id2 = net.nodes[i+1].split('.')[0];
                    if (!componentPositions[id1] || !componentPositions[id2]) continue;
                    const p1 = componentPositions[id1], p2 = componentPositions[id2];
                    const line = document.createElementNS(svgNS, 'line');
                    line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
                    line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
                    line.setAttribute('stroke', color); line.setAttribute('stroke-width', 1.5);
                    svg.appendChild(line);
                }
            });

            // Componentes
            const typeColor = {
                resistor:'#cc6600', led:'#cc8800', capacitor:'#336699',
                esp32:'#003344', arduino_uno:'#334455', relay:'#553300',
                relay_module:'#553300', diode:'#444', moisture_sensor:'#114433',
                sensor:'#114433', button:'#555555',
            };

            currentCircuit.components.forEach(comp => {
                const pos = componentPositions[comp.id];
                const g   = document.createElementNS(svgNS, 'g');
                g.setAttribute('id', `comp-${comp.id}`);
                g.setAttribute('transform', `translate(${pos.x},${pos.y})`);
                g.setAttribute('data-comp-id', comp.id);

                const t    = comp.resolved_type || comp.type || 'generic';
                const rect = document.createElementNS(svgNS, 'rect');
                rect.setAttribute('x', -26); rect.setAttribute('y', -16);
                rect.setAttribute('width', 52); rect.setAttribute('height', 32);
                rect.setAttribute('rx', 3);
                rect.setAttribute('fill', typeColor[t] || '#444');
                rect.setAttribute('stroke', '#aaa'); rect.setAttribute('stroke-width', 1);
                g.appendChild(rect);

                const lbl = document.createElementNS(svgNS, 'text');
                lbl.setAttribute('x', 0); lbl.setAttribute('y', 5);
                lbl.setAttribute('font-size', 10); lbl.setAttribute('fill', '#fff');
                lbl.setAttribute('text-anchor', 'middle');
                lbl.setAttribute('font-family', 'monospace');
                lbl.textContent = comp.id;
                g.appendChild(lbl);

                const nameEl = document.createElementNS(svgNS, 'text');
                nameEl.setAttribute('x', 0); nameEl.setAttribute('y', 36);
                nameEl.setAttribute('font-size', 8); nameEl.setAttribute('fill', '#aaa');
                nameEl.setAttribute('text-anchor', 'middle');
                nameEl.setAttribute('font-family', 'Arial');
                nameEl.textContent = (comp.name || '').slice(0, 18);
                g.appendChild(nameEl);

                // Hit-area para arrastre
                const hit = document.createElementNS(svgNS, 'rect');

                svg.appendChild(g);

                _initDraggable(g, comp.id, (cId, nx, ny) => {
                    componentPositions[cId] = { x: nx, y: ny };
                    _saveLayout(circuitId);
                });
            });
        }

        // ── Three.js 3D — con OrbitControls y datos reales del circuito ─────────
        let _threeOrbitControls = null;

        function _resetThreeJS() {
            if (threeRenderer) {
                threeRenderer.dispose();
                threeRenderer = null;
            }
            threeScene    = null;
            threeCamera   = null;
            _threeOrbitControls = null;
        }

        async function initThreeJS() {
            if (threeScene) return;

            threeScene = new THREE.Scene();
            threeScene.background = new THREE.Color(0x0d1117);

            threeCamera = new THREE.PerspectiveCamera(
                45,
                breadboardView.clientWidth / Math.max(breadboardView.clientHeight, 1),
                0.1, 2000
            );
            threeCamera.position.set(60, 90, 140);
            threeCamera.lookAt(0, 0, 0);

            threeRenderer = new THREE.WebGLRenderer({ antialias: true });
            threeRenderer.setPixelRatio(window.devicePixelRatio || 1);
            threeRenderer.shadowMap.enabled = true;
            threeRenderer.setSize(breadboardView.clientWidth, breadboardView.clientHeight);
            breadboardView.innerHTML = '';
            breadboardView.appendChild(threeRenderer.domElement);

            // Luces
            threeScene.add(new THREE.AmbientLight(0x404040, 2.5));
            const dir = new THREE.DirectionalLight(0xffffff, 1.8);
            dir.position.set(80, 150, 80);
            dir.castShadow = true;
            threeScene.add(dir);
            threeScene.add(new THREE.HemisphereLight(0x334466, 0x111111, 0.8));

            // Grid
            threeScene.add(new THREE.GridHelper(300, 30, 0x222233, 0x1a1a2e));

            // OrbitControls
            if (typeof THREE.OrbitControls !== 'undefined') {
                _threeOrbitControls = new THREE.OrbitControls(threeCamera, threeRenderer.domElement);
                _threeOrbitControls.enableDamping  = true;
                _threeOrbitControls.dampingFactor  = 0.06;
                _threeOrbitControls.minDistance    = 20;
                _threeOrbitControls.maxDistance    = 800;
                _threeOrbitControls.maxPolarAngle  = Math.PI / 2;
            }

            // Construir escena con datos reales
            await _buildThreeScene();

            function animate() {
                requestAnimationFrame(animate);
                if (_threeOrbitControls) _threeOrbitControls.update();
                threeRenderer.render(threeScene, threeCamera);
            }
            animate();

            window.addEventListener('resize', () => {
                if (!breadboardView.clientWidth || !threeCamera) return;
                threeCamera.aspect = breadboardView.clientWidth / Math.max(breadboardView.clientHeight, 1);
                threeCamera.updateProjectionMatrix();
                threeRenderer.setSize(breadboardView.clientWidth, breadboardView.clientHeight);
            });
        }

        async function _buildThreeScene() {
            if (!threeScene) return;

            // PCB base — green FR4 with copper edge
            const pcbW = 200, pcbD = 140, pcbH = 1.6;
            const pcbGeo = new THREE.BoxGeometry(pcbW, pcbH, pcbD);
            const pcbMat = new THREE.MeshStandardMaterial({
                color: 0x1a5c34, roughness: 0.85, metalness: 0.05
            });
            const pcb = new THREE.Mesh(pcbGeo, pcbMat);
            pcb.receiveShadow = true;
            pcb.position.set(0, -pcbH / 2, 0);
            threeScene.add(pcb);

            // Copper edge traces (gold border)
            const edgesGeo = new THREE.EdgesGeometry(pcbGeo);
            threeScene.add(new THREE.LineSegments(
                edgesGeo,
                new THREE.LineBasicMaterial({ color: 0xc8a000 })
            ));

            // Silkscreen grid pattern on PCB (subtle)
            const gridHelper = new THREE.GridHelper(Math.min(pcbW,pcbD)*0.9, 12, 0x224433, 0x1a3328);
            gridHelper.position.set(0, 0.02, 0);
            threeScene.add(gridHelper);

            if (!currentCircuit) return;

            const comps = currentCircuit.components || [];
            // Functional layout: MCU center, others around
            const mcuTypes = new Set(['arduino_uno','arduino_nano','arduino_mega','esp32','esp8266','pico','stm32','mcu']);
            const mcus  = comps.filter(c => mcuTypes.has(c.resolved_type || c.type));
            const rest  = comps.filter(c => !mcuTypes.has(c.resolved_type || c.type));
            const ordered = [...mcus, ...rest];
            const cols = Math.max(1, Math.ceil(Math.sqrt(ordered.length)));
            const rows = Math.ceil(ordered.length / cols);
            const spX  = (pcbW * 0.85) / (cols + 1);
            const spZ  = (pcbD * 0.85) / (rows + 1);

            const compPos = {};
            ordered.forEach((comp, i) => {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const x   = -pcbW * 0.425 + spX * (col + 1);
                const z   = -pcbD * 0.425 + spZ * (row + 1);
                const t   = (comp.resolved_type || comp.type || 'generic').toLowerCase();
                const topY = _addComponent3D(comp, t, x, z);
                compPos[comp.id] = { x, y: topY, z };
            });

            // Wires between nets — colored arcs
            const netColorMap = {
                vcc: 0xff3333, gnd: 0x444444, i2c: 0x33aa66,
                spi: 0xaa33aa, uart: 0xcc8800, pwm: 0xff6600,
                data: 0x3366ff,
            };
            const defaultNetColors = [0xff4444, 0x44cc88, 0x4488ff, 0xffcc44, 0xff44cc, 0x44ffcc, 0xff8833];
            (currentCircuit.nets || []).forEach((net, ni) => {
                const nl = (net.name || '').toLowerCase();
                let wireColor = defaultNetColors[ni % defaultNetColors.length];
                for (const [key, col] of Object.entries(netColorMap)) {
                    if (nl.includes(key)) { wireColor = col; break; }
                }
                const mat = new THREE.LineBasicMaterial({ color: wireColor });
                const nodes = net.nodes || [];
                for (let i = 0; i < nodes.length - 1; i++) {
                    const id1 = nodes[i].split('.')[0];
                    const id2 = nodes[i + 1].split('.')[0];
                    if (!compPos[id1] || !compPos[id2]) continue;
                    const p1 = compPos[id1], p2 = compPos[id2];
                    const arcH = Math.max(p1.y, p2.y) + 8;
                    // Smooth arc with 5 points
                    const pts = [];
                    for (let t = 0; t <= 1; t += 0.2) {
                        const ix = p1.x + (p2.x - p1.x) * t;
                        const iz = p1.z + (p2.z - p1.z) * t;
                        const iy = p1.y + (arcH - p1.y) * Math.sin(t * Math.PI);
                        pts.push(new THREE.Vector3(ix, iy, iz));
                    }
                    pts.push(new THREE.Vector3(p2.x, p2.y, p2.z));
                    const geo = new THREE.BufferGeometry().setFromPoints(pts);
                    threeScene.add(new THREE.Line(geo, mat));
                }
            });
        }

        // Build a 3D component mesh, returns top Y for label/wire placement
        function _addComponent3D(comp, t, x, z) {
            let mesh, topY = 0;

            if (t === 'resistor') {
                // Axial resistor: horizontal cylinder with color bands
                const bodyGeo = new THREE.CylinderGeometry(1.5, 1.5, 9, 12);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd4a028, roughness: 0.6 });
                mesh = new THREE.Mesh(bodyGeo, bodyMat);
                mesh.rotation.z = Math.PI / 2;
                mesh.position.set(x, 2, z);
                threeScene.add(mesh);
                // Lead wires
                for (const dx of [-6, 6]) {
                    const leadGeo = new THREE.CylinderGeometry(0.3, 0.3, 4, 6);
                    const lead = new THREE.Mesh(leadGeo, new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 }));
                    lead.rotation.z = Math.PI / 2;
                    lead.position.set(x + dx, 1.5, z);
                    threeScene.add(lead);
                }
                // Color bands
                for (const [bx, col] of [[-2.5, 0xcc4400], [0, 0x333333], [2.5, 0xcc8800]]) {
                    const bandGeo = new THREE.CylinderGeometry(1.55, 1.55, 1.2, 12);
                    const band = new THREE.Mesh(bandGeo, new THREE.MeshStandardMaterial({ color: col }));
                    band.rotation.z = Math.PI / 2;
                    band.position.set(x + bx, 2, z);
                    threeScene.add(band);
                }
                topY = 4;

            } else if (t === 'led' || t === 'led_rgb') {
                // LED: cylinder body + dome
                const ledColor = { red:0xee2222, green:0x22cc22, blue:0x2244ee, yellow:0xddcc00,
                                   white:0xdddddd, orange:0xee7700, rgb:0xcc44cc }[comp.color || 'red'] || 0xee2222;
                const bodyGeo = new THREE.CylinderGeometry(2.5, 2.5, 5, 12);
                mesh = new THREE.Mesh(bodyGeo, new THREE.MeshStandardMaterial({ color: ledColor, roughness: 0.3, metalness: 0.1 }));
                mesh.position.set(x, 3.5, z);
                threeScene.add(mesh);
                // Dome (hemisphere)
                const domeGeo = new THREE.SphereGeometry(2.5, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2);
                const domeMat = new THREE.MeshStandardMaterial({ color: ledColor, transparent: true, opacity: 0.75, roughness: 0.1 });
                const dome = new THREE.Mesh(domeGeo, domeMat);
                dome.position.set(x, 6.1, z);
                threeScene.add(dome);
                // Leads
                for (const [dz, len] of [[1.5, 8], [-1.5, 6]]) {
                    const lg = new THREE.CylinderGeometry(0.25, 0.25, len, 6);
                    const lm = new THREE.Mesh(lg, new THREE.MeshStandardMaterial({ color: 0xbbbbbb, metalness: 0.9 }));
                    lm.position.set(x, -len/2 + 1, z + dz);
                    threeScene.add(lm);
                }
                topY = 7;

            } else if (t === 'capacitor' || t === 'capacitor_electrolytic') {
                // Electrolytic cap: tall cylinder, silver/blue
                const capGeo = new THREE.CylinderGeometry(3, 3, 14, 16);
                const capMat = new THREE.MeshStandardMaterial({ color: 0x336699, roughness: 0.5, metalness: 0.3 });
                mesh = new THREE.Mesh(capGeo, capMat);
                mesh.position.set(x, 7, z);
                threeScene.add(mesh);
                // Top disc (silver)
                const topGeo = new THREE.CylinderGeometry(3, 3, 0.5, 16);
                const topMesh = new THREE.Mesh(topGeo, new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.7 }));
                topMesh.position.set(x, 14.2, z);
                threeScene.add(topMesh);
                // K stripe
                const stripeGeo = new THREE.CylinderGeometry(3.02, 3.02, 2, 16, 1, true, 0, Math.PI);
                const stripeMat = new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide });
                const stripe = new THREE.Mesh(stripeGeo, stripeMat);
                stripe.position.set(x, 7, z);
                threeScene.add(stripe);
                topY = 15;

            } else if (t === 'diode' || t === '1n4007' || t === '1n5819') {
                // Axial diode: cylinder with cathode band
                const dGeo = new THREE.CylinderGeometry(1.2, 1.2, 7, 10);
                mesh = new THREE.Mesh(dGeo, new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5 }));
                mesh.rotation.z = Math.PI / 2;
                mesh.position.set(x, 1.5, z);
                threeScene.add(mesh);
                // Cathode band (silver)
                const bandGeo = new THREE.CylinderGeometry(1.22, 1.22, 1.2, 10);
                const band = new THREE.Mesh(bandGeo, new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.7 }));
                band.rotation.z = Math.PI / 2;
                band.position.set(x + 2.5, 1.5, z);
                threeScene.add(band);
                topY = 3;

            } else if (['arduino_uno','arduino_nano','arduino_mega'].includes(t)) {
                const dims = { arduino_uno:{w:55,d:40,col:0x006699}, arduino_nano:{w:18,d:45,col:0x334455}, arduino_mega:{w:55,d:100,col:0x224466} }[t] || {w:55,d:40,col:0x006699};
                // PCB body
                const bGeo = new THREE.BoxGeometry(dims.w, 1.6, dims.d);
                mesh = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color: dims.col, roughness: 0.8 }));
                mesh.position.set(x, 0.8, z);
                threeScene.add(mesh);
                // USB connector
                const usbGeo = new THREE.BoxGeometry(8, 4, 6);
                const usb = new THREE.Mesh(usbGeo, new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9 }));
                usb.position.set(x - dims.w/2 + 4, 3, z - dims.d/2 + 3);
                threeScene.add(usb);
                // Pin headers (two rows)
                for (const dz of [-dims.d*0.3, dims.d*0.3]) {
                    const phGeo = new THREE.BoxGeometry(dims.w * 0.8, 2.5, 2.5);
                    const ph = new THREE.Mesh(phGeo, new THREE.MeshStandardMaterial({ color: 0x111111 }));
                    ph.position.set(x, 2.5, z + dz);
                    threeScene.add(ph);
                }
                // IC chip on board
                const icGeo = new THREE.BoxGeometry(8, 2, 8);
                const ic = new THREE.Mesh(icGeo, new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 }));
                ic.position.set(x + dims.w*0.15, 2.6, z);
                threeScene.add(ic);
                _addEdgeHighlight(mesh, 0xffd700);
                topY = 5;

            } else if (t === 'esp32' || t === 'esp8266') {
                const mw = t === 'esp32' ? 26 : 22, md = t === 'esp32' ? 18 : 15;
                const bGeo = new THREE.BoxGeometry(mw, 1.6, md);
                mesh = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color: 0x003344, roughness: 0.8 }));
                mesh.position.set(x, 0.8, z);
                threeScene.add(mesh);
                // Metal shield (antenna module)
                const shGeo = new THREE.BoxGeometry(mw * 0.55, 2, md * 0.7);
                const sh = new THREE.Mesh(shGeo, new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9 }));
                sh.position.set(x + mw * 0.1, 2.6, z);
                threeScene.add(sh);
                // Antenna trace
                const antGeo = new THREE.BoxGeometry(1, 0.5, md * 0.6);
                const ant = new THREE.Mesh(antGeo, new THREE.MeshStandardMaterial({ color: 0xccaa00, metalness: 0.8 }));
                ant.position.set(x - mw/2 + 0.5, 1.8, z);
                threeScene.add(ant);
                _addEdgeHighlight(mesh, 0x00aaff);
                topY = 5;

            } else if (t === 'relay' || t === 'relay_module') {
                // Relay: box body + coil bump
                const bGeo = new THREE.BoxGeometry(19, 15, 16);
                mesh = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color: 0x223355, roughness: 0.8 }));
                mesh.position.set(x, 7.5, z);
                threeScene.add(mesh);
                // Coil housing
                const coilGeo = new THREE.BoxGeometry(10, 4, 12);
                const coil = new THREE.Mesh(coilGeo, new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 }));
                coil.position.set(x - 2, 16.5, z);
                threeScene.add(coil);
                _addEdgeHighlight(mesh, 0x5577aa);
                topY = 17;

            } else if (t === 'oled' || t === 'lcd' || t === 'display') {
                const dw = t === 'lcd' ? 80 : 27, dd = t === 'lcd' ? 36 : 27;
                const bGeo = new THREE.BoxGeometry(dw, 1.6, dd);
                mesh = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color: 0x111133, roughness: 0.9 }));
                mesh.position.set(x, 0.8, z);
                threeScene.add(mesh);
                // Screen (dark with blue glow)
                const scrGeo = new THREE.BoxGeometry(dw * 0.85, 0.4, dd * 0.8);
                const scrMat = new THREE.MeshStandardMaterial({ color: 0x0011aa, emissive: 0x000055, roughness: 0.1 });
                const scr = new THREE.Mesh(scrGeo, scrMat);
                scr.position.set(x, 2.0, z);
                threeScene.add(scr);
                _addEdgeHighlight(mesh, 0x3344ff);
                topY = 5;

            } else if (t === 'motor_driver' || t === 'l298n') {
                // L298N: large module with heatsink
                const bGeo = new THREE.BoxGeometry(34, 2, 34);
                mesh = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.8 }));
                mesh.position.set(x, 1, z);
                threeScene.add(mesh);
                // Heatsink fins
                for (let fi = -2; fi <= 2; fi++) {
                    const finGeo = new THREE.BoxGeometry(2, 18, 30);
                    const fin = new THREE.Mesh(finGeo, new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7 }));
                    fin.position.set(x - 8 + fi * 4, 10, z);
                    threeScene.add(fin);
                }
                // IC chip
                const icGeo = new THREE.BoxGeometry(14, 3, 18);
                const ic = new THREE.Mesh(icGeo, new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 }));
                ic.position.set(x + 8, 3.5, z);
                threeScene.add(ic);
                topY = 20;

            } else if (t === 'sensor' || t === 'moisture_sensor' || t === 'hc_sr04' || t === 'ultrasonic') {
                // Sensor module: flat green board
                const bGeo = new THREE.BoxGeometry(18, 1.6, 12);
                mesh = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color: 0x1a5c34, roughness: 0.8 }));
                mesh.position.set(x, 0.8, z);
                threeScene.add(mesh);
                // Transducer circles for ultrasonic
                if (t === 'hc_sr04' || t === 'ultrasonic') {
                    for (const dx of [-5, 5]) {
                        const tGeo = new THREE.CylinderGeometry(4, 4, 3, 16);
                        const tm = new THREE.Mesh(tGeo, new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.4 }));
                        tm.position.set(x + dx, 3.3, z);
                        threeScene.add(tm);
                    }
                    topY = 7;
                } else {
                    topY = 4;
                }

            } else if (t === 'button') {
                // Tactile button: square body + round actuator
                const bGeo = new THREE.BoxGeometry(6, 3.5, 6);
                mesh = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.7 }));
                mesh.position.set(x, 1.75, z);
                threeScene.add(mesh);
                const actGeo = new THREE.CylinderGeometry(1.5, 1.5, 2, 12);
                const act = new THREE.Mesh(actGeo, new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.4 }));
                act.position.set(x, 4.5, z);
                threeScene.add(act);
                topY = 6;

            } else {
                // Generic IC: flat box with pin stubs
                const bw = 14, bh = 3, bd = 10;
                const bGeo = new THREE.BoxGeometry(bw, bh, bd);
                mesh = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.9 }));
                mesh.position.set(x, bh/2, z);
                threeScene.add(mesh);
                // Pin rows
                for (const side of [-1, 1]) {
                    for (let pi = 0; pi < 4; pi++) {
                        const pinGeo = new THREE.BoxGeometry(3, 0.6, 0.8);
                        const pin = new THREE.Mesh(pinGeo, new THREE.MeshStandardMaterial({ color: 0xccaa00, metalness: 0.9 }));
                        pin.position.set(x + side * (bw/2 + 1.5), 0.3, z - bd/2 + 1.2 + pi * 2.8);
                        threeScene.add(pin);
                    }
                }
                _addEdgeHighlight(mesh, 0x5566aa);
                topY = bh + 1;
            }

            // Label
            _addSpriteLabel(comp.id, x, topY + 3, z);
            return topY;
        }

        function _addEdgeHighlight(mesh, color) {
            const eg = new THREE.EdgesGeometry(mesh.geometry);
            const el = new THREE.LineSegments(eg, new THREE.LineBasicMaterial({ color }));
            el.position.copy(mesh.position);
            threeScene.add(el);
        }

        function _addSpriteLabel(text, x, y, z) {
            const canvas = document.createElement('canvas');
            canvas.width = 80; canvas.height = 28;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.65)';
            ctx.roundRect(0, 0, 80, 28, 4);
            ctx.fill();
            ctx.fillStyle = '#00d4ff';
            ctx.font = 'bold 13px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(text, 40, 20);
            const tex    = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
            sprite.position.set(x, y + 4, z);
            sprite.scale.set(10, 3.5, 1);
            threeScene.add(sprite);
        }

            alert('Exportando archivos Gerber...\n\nEn una implementación real, esto generaría archivos ZIP con:\n- copper_top.gbr\n- copper_bottom.gbr\n- silkscreen_top.gto\n- soldermask_bottom.gbo\n- drills.txt\n- outline.gko');

        // Exportar SVG
        function exportSVG() {
            if (!currentCircuit) {
                alert('No hay circuito para exportar');
                return;
            }
            
            // Generar SVG del esquemático
            const svgContent = schematicView.innerHTML;
            
            // Crear blob y descargar
            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentCircuit.name.replace(/\s+/g, '_')}_schematic.svg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Simular circuito
        function simulateCircuit() {
            if (!currentCircuit) {
                alert('No hay circuito para simular');
                return;
            }

            alert(`Simulando circuito: ${currentCircuit.name}\n\nComponentes: ${currentCircuit.components.length}\nRedes: ${currentCircuit.nets.length}`);
        }

        // ── Auth helper ─────────────────────────────────────────────────────
        function _viewerToken() {
            return localStorage.getItem('stratum_jwt') || '';
        }
        function _viewerFetch(url, opts = {}) {
            const tok = _viewerToken();
            if (tok) opts = { ...opts, headers: { 'Authorization': `Bearer ${tok}`, ...(opts.headers || {}) } };
            return fetch(url, opts);
        }

        // ── Visual Editor ───────────────────────────────────────────────────
        let _selectedCompId = null;
        let _editorDirty    = false;

        function _selectComponent(compId) {
            // Deselect previous
            if (_selectedCompId) {
                const prev = document.getElementById(`comp-${_selectedCompId}`);
                if (prev) prev.style.outline = '';
                const prevRect = prev?.querySelector('rect,polygon,circle,ellipse');
                if (prevRect) prevRect.removeAttribute('filter');
            }
            _selectedCompId = compId;
            const btn = document.getElementById('btn-del-comp');
            if (compId) {
                btn.style.display = '';
                btn.textContent = `✕ Eliminar ${compId}`;
                // Highlight
                const g = document.getElementById(`comp-${compId}`);
                if (g) {
                    const shape = g.querySelector('rect,polygon,circle,ellipse');
                    if (shape) shape.setAttribute('stroke', '#f0e68c');
                }
            } else {
                btn.style.display = 'none';
            }
        }

        // Wire click-to-select on component list items (compatible con server SVG)
        function _wireEditorClicksOnList() {
            if (!currentCircuit) return;
            document.querySelectorAll('.component-item[data-comp-id]').forEach(el => {
                el.style.cursor = 'pointer';
                el.addEventListener('click', () => {
                    const cid = el.getAttribute('data-comp-id');
                    _selectComponent(cid === _selectedCompId ? null : cid);
                    // También intentar highlight en fallback SVG si existe
                    const g = document.getElementById(`comp-${cid}`);
                    if (g) {
                        const shape = g.querySelector('rect,polygon,circle,ellipse');
                        if (shape) shape.setAttribute('stroke', '#f0e68c');
                    }
                });
            });
        }

        // Delete selected component
        document.getElementById('btn-del-comp').addEventListener('click', () => {
            if (!_selectedCompId || !currentCircuit) return;
            const name = currentCircuit.components.find(c => c.id === _selectedCompId)?.name || _selectedCompId;
            if (!confirm(`¿Eliminar "${name}" (${_selectedCompId})?`)) return;
            currentCircuit.components = currentCircuit.components.filter(c => c.id !== _selectedCompId);
            // Remove nets that only referenced this component
            currentCircuit.nets = currentCircuit.nets.map(n => ({
                ...n,
                nodes: n.nodes.filter(nd => !nd.startsWith(_selectedCompId + '.'))
            }));
            _selectedCompId = null;
            document.getElementById('btn-del-comp').style.display = 'none';
            _editorDirty = true;
            document.getElementById('btn-save-edit').style.display = '';
            renderSchematic();
            renderComponentsList();
        });

        // Add Component modal
        document.getElementById('btn-add-comp').addEventListener('click', () => {
            document.getElementById('add-comp-modal').style.display = 'flex';
            document.getElementById('ec-id').focus();
        });
        document.getElementById('ec-cancel').addEventListener('click', () => {
            document.getElementById('add-comp-modal').style.display = 'none';
        });
        document.getElementById('ec-confirm').addEventListener('click', () => {
            if (!currentCircuit) return;
            const id    = document.getElementById('ec-id').value.trim().toUpperCase();
            const type  = document.getElementById('ec-type').value;
            const name  = document.getElementById('ec-name').value.trim() || type;
            const value = document.getElementById('ec-value').value.trim();
            if (!id) { alert('Ingresá un ID'); return; }
            if (currentCircuit.components.find(c => c.id === id)) {
                alert(`Ya existe un componente con ID "${id}"`); return;
            }
            currentCircuit.components.push({ id, name, type, resolved_type: type, value, unit: '' });
            _editorDirty = true;
            document.getElementById('btn-save-edit').style.display = '';
            document.getElementById('add-comp-modal').style.display = 'none';
            // Reset form
            ['ec-id','ec-name','ec-value'].forEach(i => document.getElementById(i).value = '');
            renderSchematic();
            renderComponentsList();
        });

        // Save changes to backend
        document.getElementById('btn-save-edit').addEventListener('click', async () => {
            if (!currentCircuit || !currentCircuit.id) {
                alert('El circuito no tiene ID — guardá primero el circuito desde el chat.');
                return;
            }
            const btn = document.getElementById('btn-save-edit');
            btn.textContent = '⏳ Guardando…';
            btn.disabled = true;
            try {
                const r = await _viewerFetch(`/api/circuits/${currentCircuit.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        components:  currentCircuit.components,
                        nets:        currentCircuit.nets,
                        name:        currentCircuit.name,
                        description: currentCircuit.description,
                    }),
                });
                if (r.ok) {
                    _editorDirty = false;
                    btn.textContent = '✓ Guardado';
                    setTimeout(() => { btn.style.display = 'none'; btn.textContent = '💾 Guardar'; }, 2000);
                } else {
                    const e = await r.json();
                    alert('Error: ' + (e.detail || r.status));
                    btn.textContent = '💾 Guardar';
                }
            } catch(err) {
                alert('Error de red: ' + err);
                btn.textContent = '💾 Guardar';
            }
            btn.disabled = false;
        });

        // Warn on unload if dirty
        window.addEventListener('beforeunload', e => {
            if (_editorDirty) { e.preventDefault(); e.returnValue = ''; }
        });
    </script>
    <script src="/static/modules/live_circuit.js"></script>
    <script>
        // Auto-start live overlay if ?id= is in the URL
        const _lcId = new URLSearchParams(location.search).get('id');
        if (_lcId) LiveCircuit.start(parseInt(_lcId));
    </script>
</body>
</html>
