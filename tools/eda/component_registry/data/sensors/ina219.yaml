type: ina219
category: sensor
display_name: INA219 (medidor corriente/tension I2C)
aliases: [ina219, ina 219, sensor corriente, corriente i2c, power monitor]
voltage: { vcc_min: 3.0, vcc_max: 5.5, logic: 3.3 }
footprint_library: Connector_PinHeader_2.54mm
footprint_name: PinHeader_1x06_P2.54mm_Vertical
symbol_library: Sensor
symbol_name: INA219
smd: false
pins:
  - { number: '1', name: VCC,   electrical_type: power_in,      functions: [POWER] }
  - { number: '2', name: GND,   electrical_type: power_in,      functions: [GROUND] }
  - { number: '3', name: SCL,   electrical_type: input,         functions: [I2C_SCL, CLOCK] }
  - { number: '4', name: SDA,   electrical_type: bidirectional, functions: [I2C_SDA, DATA] }
  - { number: '5', name: 'VIN+', electrical_type: passive,      functions: [POWER] }
  - { number: '6', name: 'VIN-', electrical_type: passive,      functions: [POWER] }
wiring_requirements:
  - { kind: pullup, pin: SDA, target: VCC, value: 4.7k, severity: warning,
      reason: Pull-up I2C 4.7k en SDA si el modulo no los trae. }
  - { kind: pullup, pin: SCL, target: VCC, value: 4.7k, severity: warning,
      reason: Pull-up I2C 4.7k en SCL si el modulo no los trae. }
notes:
  - Shunt 0.1 ohm entre VIN+ y VIN- en serie con la carga.
  - Direccion I2C 0x40 con A0=A1=GND.
critical: []
