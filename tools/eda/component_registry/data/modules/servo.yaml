type: servo
category: actuator
display_name: Servo Motor (SG90/MG996R y similares)
aliases: [servo, servo motor, sg90, mg996r, motor servo]
voltage: { vcc_min: 4.8, vcc_max: 6.0, logic: 5.0 }
footprint_library: Connector_PinHeader_2.54mm
footprint_name: PinHeader_1x03_P2.54mm_Vertical
symbol_library: Motor
symbol_name: Motor_Servo
smd: false
pins:
  - { number: '1', name: VCC,    electrical_type: power_in, functions: [POWER] }
  - { number: '2', name: GND,    electrical_type: power_in, functions: [GROUND] }
  - { number: '3', name: SIGNAL, electrical_type: input,    functions: [PWM, SIGNAL] }
wiring_requirements:
  - { kind: bulk_cap, target: VCC, value: 100uF, severity: warning,
      reason: Cap 100uF cerca del servo absorbe picos de corriente. }
notes:
  - PWM 50Hz; pulso 1ms-2ms mapea 0-180 grados.
  - SG90 100-250mA; MG996R hasta 1A en arranque.
critical:
  - MG996R requiere fuente externa - el regulador del Arduino no entrega 1A pico.
