type: hc05
category: ic
display_name: HC-05 (Bluetooth Serial)
aliases: [hc-05, hc05, hc 05, bluetooth serial, bt serial, modulo bluetooth, módulo bluetooth]
voltage: { vcc_min: 3.6, vcc_max: 6.0, logic: 3.3 }
footprint_library: Connector_PinHeader_2.54mm
footprint_name: PinHeader_1x06_P2.54mm_Vertical
symbol_library: RF
symbol_name: HC-05
smd: false
pins:
  - { number: '1', name: KEY,   electrical_type: input,    functions: [SIGNAL] }
  - { number: '2', name: VCC,   electrical_type: power_in, functions: [POWER] }
  - { number: '3', name: GND,   electrical_type: power_in, functions: [GROUND] }
  - { number: '4', name: TXD,   electrical_type: output,   functions: [UART_TX, SIGNAL] }
  - { number: '5', name: RXD,   electrical_type: input,    functions: [UART_RX, SIGNAL] }
  - { number: '6', name: STATE, electrical_type: output,   functions: [SIGNAL] }
wiring_requirements:
  - { kind: level_shifter, pin: RXD, severity: error,
      reason: RXD acepta maximo 3.3V - usar divisor 1k+2k desde TX 5V. }
notes:
  - Baudrate datos 9600 bps; modo AT 38400 bps.
  - KEY en HIGH al encender para entrar a modo AT.
critical:
  - RXD del modulo tolera solo 3.3V - 5V puede danar el modulo.
